apiVersion: v1
kind: Service
metadata:
  name: repomind-service
spec:
  type: NodePort
  selector:
    app: repomind
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30000

# kind: Service — object type (note: apiVersion: v1, not apps/v1 — Services are core API)
# type: NodePort — exposes the service on a port of the Minikube node
# selector.app: repomind — this must match your pods' labels. The Service finds pods labeled app: repomind and routes to them. This is the same label-matching glue as the Deployment.
# port: 80 — the port the Service listens on (inside cluster)
# targetPort: 3000 — the port on the pods (your container's port)
# nodePort: 30000 — the port exposed on the node (must be 30000–32767)