services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: repomind
      POSTGRES_PASSWORD: npg_xMFH0o3miRGC
      POSTGRES_DB: repomind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres

  inngest:
    image: inngest/inngest:latest
    command: inngest dev -u http://web:3000/api/inngest
    ports:
      - "8288:8288"
    depends_on:
      - web

volumes:
  postgres_data: